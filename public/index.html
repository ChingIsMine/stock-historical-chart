<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Historical Chart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-label="Chart icon">
        <path d="M3 20L9 14L13 18L21 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M17 6H21V10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Stock Historical Chart
    </h1>

    <div class="header-actions">
      <!-- Layout switcher -->
      <div class="layout-switcher" id="layout-switcher">
        <button data-layout="column" class="active" title="Stack vertically">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="14" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button data-layout="row" title="Side by side">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="14" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="6" height="14" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button data-layout="grid" title="Grid">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>

      <button id="add-chart-btn" class="btn-add" type="button">+ Add Chart</button>
    </div>
  </header>

  <!-- Chart panels container -->
  <main id="charts-grid" class="charts-grid layout-column">
    <!-- Chart panels are injected by JS -->
  </main>

  <footer>
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">
      Created with Perplexity Computer
    </a>
  </footer>

  <!-- TradingView Lightweight Charts v5 -->
  <script src="https://unpkg.com/lightweight-charts@5.0.5/dist/lightweight-charts.standalone.production.js"></script>
  <script src="app.js"></script>
</body>
</html>
