<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Historical Chart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-left">
      <h1>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-label="Chart icon">
          <path d="M3 20L9 14L13 18L21 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17 6H21V10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Stock Chart
      </h1>
      <div class="global-controls">
        <input type="text" id="global-ticker" placeholder="AAPL" spellcheck="false" autocomplete="off" maxlength="10" />
        <input type="date" id="global-date" />
        <button id="global-search" class="btn-go" type="button">Load All</button>
      </div>
    </div>
    <div class="header-right">
      <!-- Drawing tools -->
      <div class="tool-bar" id="tool-bar">
        <button data-tool="pointer" class="active" title="Pointer">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 2L13 8L8 9L6 14L3 2Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </button>
        <button data-tool="trendline" title="Trend Line">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 14L14 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button data-tool="long" title="Long Position (R:R)">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="12" rx="1" stroke="currentColor" stroke-width="1.3"/><path d="M8 10V5M6 7L8 5L10 7" stroke="#26a69a" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button data-tool="short" title="Short Position (R:R)">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="12" rx="1" stroke="currentColor" stroke-width="1.3"/><path d="M8 5V10M6 8L8 10L10 8" stroke="#ef5350" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="clear-drawings" title="Clear All Drawings">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 4L12 12M12 4L4 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="separator"></div>
      <!-- Indicator settings -->
      <button id="indicator-settings-btn" class="btn-icon" title="Indicator Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M8 1V3M8 13V15M1 8H3M13 8H15M2.9 2.9L4.3 4.3M11.7 11.7L13.1 13.1M13.1 2.9L11.7 4.3M4.3 11.7L2.9 13.1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <!-- Layout switcher -->
      <div class="layout-switcher" id="layout-switcher">
        <button data-layout="column" class="active" title="Stack">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="1" width="12" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="2" y="9" width="12" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
        <button data-layout="row" title="Side by side">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="6" height="12" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="2" width="6" height="12" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
        <button data-layout="grid" title="Grid">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
      </div>
      <button id="add-chart-btn" class="btn-add" type="button">+ Add</button>
    </div>
  </header>

  <!-- Indicator Settings Modal -->
  <div id="indicator-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span>Indicator Settings</span>
        <button id="modal-close" class="btn-close-modal">&times;</button>
      </div>
      <div class="modal-body" id="indicator-rows">
        <!-- Rows injected by JS -->
      </div>
      <div class="modal-footer">
        <button id="modal-apply" class="btn-go">Apply</button>
      </div>
    </div>
  </div>

  <!-- Charts -->
  <main id="charts-grid" class="charts-grid layout-column"></main>

  <footer>
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">
      Created with Perplexity Computer
    </a>
  </footer>

  <script src="https://unpkg.com/lightweight-charts@5.0.5/dist/lightweight-charts.standalone.production.js"></script>
  <script src="app.js"></script>
</body>
</html>
